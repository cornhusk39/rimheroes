<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Porter gestral, side view (east, facing right). -->
  <!-- far ear (rooted at back of head) -->
  <path d="M160 68 C146 30 154 14 168 10 C174 30 172 54 168 70 Z" fill="#8F7348"/>
  <!-- tail nub -->
  <circle cx="56" cy="196" r="14" fill="#8F7348"/>
  <!-- body (bean, longer than tall) -->
  <ellipse cx="120" cy="170" rx="84" ry="62" fill="#A98B5E"/>
  <!-- belly -->
  <ellipse cx="128" cy="196" rx="52" ry="30" fill="#C9AE82"/>
  <!-- head (right side, slightly raised) -->
  <circle cx="178" cy="100" r="46" fill="#B3956A"/>
  <ellipse cx="170" cy="78" rx="30" ry="17" fill="#D8C194" opacity="0.5"/>
  <!-- near ear (rooted at head top) -->
  <path d="M178 62 C166 24 176 10 190 6 C196 26 194 50 190 66 Z" fill="#A98B5E"/>
  <path d="M182 58 C174 32 180 20 188 14 C192 30 191 48 188 60 Z" fill="#C9AE82"/>
  <!-- snout -->
  <ellipse cx="216" cy="108" rx="18" ry="13" fill="#C9AE82"/>
  <circle cx="226" cy="104" r="5" fill="#5C4A33"/>
  <!-- eye -->
  <circle cx="188" cy="94" r="7" fill="#2E2620"/>
  <circle cx="190.5" cy="91.5" r="2.2" fill="#F5EEDD"/>
  <!-- satchel on flank -->
  <path d="M150 122 L120 212" stroke="#8A6A43" stroke-width="13" stroke-linecap="round"/>
  <rect x="92" y="176" width="58" height="46" rx="10" fill="#5E4226"/>
  <rect x="92" y="176" width="58" height="17" rx="8" fill="#74522F"/>
  <circle cx="121" cy="198" r="5" fill="#C9AE82"/>
  <!-- legs -->
  <ellipse cx="84" cy="226" rx="18" ry="11" fill="#7A6243"/>
  <ellipse cx="158" cy="228" rx="18" ry="11" fill="#7A6243"/>
</svg>
