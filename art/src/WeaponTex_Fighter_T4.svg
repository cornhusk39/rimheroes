<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Perfect Hero Longsword: glowing runed blade, winged crossguard, glow halo. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.72) rotate(45) translate(-128 -128)">
  <!-- glow halo -->
  <path d="M128 10 L106 40 L106 162 L150 162 L150 40 Z" fill="#9DC2FF" opacity="0.20"/>
  <ellipse cx="128" cy="222" rx="40" ry="40" fill="#9DC2FF" opacity="0.16"/>
  <!-- blade -->
  <path d="M128 16 L115 40 L115 154 L141 154 L141 40 Z" fill="#9AA1AA"/>
  <path d="M121 38 L121 154 L128 154 L128 26 Z" fill="#B8BEC6"/>
  <!-- glowing edges -->
  <path d="M115 40 L115 154 M141 40 L141 154 M128 16 L115 40 M128 16 L141 40" stroke="#9DC2FF" stroke-width="3" fill="none"/>
  <!-- runes -->
  <path d="M124 60 L132 64 L124 70 M124 86 L132 90 L124 96 M124 112 L132 116 L124 122" stroke="#4A6CC4" stroke-width="3" fill="none"/>
  <!-- winged crossguard -->
  <path d="M128 154 L78 138 C66 150 70 162 84 166 L128 168 Z" fill="#C9A23F"/>
  <path d="M128 154 L178 138 C190 150 186 162 172 166 L128 168 Z" fill="#C9A23F"/>
  <path d="M78 138 C66 150 70 162 84 166" stroke="#E6C766" stroke-width="2.5" fill="none"/>
  <path d="M178 138 C190 150 186 162 172 166" stroke="#E6C766" stroke-width="2.5" fill="none"/>
  <rect x="108" y="156" width="40" height="13" rx="4" fill="#E6C766"/>
  <!-- cobalt-wrapped grip -->
  <rect x="119" y="169" width="18" height="46" rx="4" fill="#2E4E9E"/>
  <path d="M119 177 L137 181 M119 187 L137 191 M119 197 L137 201 M119 207 L137 211" stroke="#4A6CC4" stroke-width="3"/>
  <!-- glowing gem pommel -->
  <circle cx="128" cy="224" r="14" fill="#C9A23F"/>
  <circle cx="128" cy="224" r="8" fill="#2E4E9E"/>
  <circle cx="128" cy="224" r="4" fill="#9DC2FF"/>
  </g>
</svg>
