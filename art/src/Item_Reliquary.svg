<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- top-down warded reliquary: dark stone coffer, gold filigree, glowing sigil-lock -->
  <rect x="18" y="26" width="92" height="78" rx="6" fill="#3a3030" stroke="#161214" stroke-width="5"/>
  <!-- lid band -->
  <rect x="18" y="26" width="92" height="26" rx="6" fill="#473a3a"/>
  <line x1="18" y1="52" x2="110" y2="52" stroke="#161214" stroke-width="3"/>
  <!-- gold corner bosses -->
  <rect x="22" y="30" width="12" height="12" rx="2" fill="#c9a44e" stroke="#161214" stroke-width="2"/>
  <rect x="94" y="30" width="12" height="12" rx="2" fill="#c9a44e" stroke="#161214" stroke-width="2"/>
  <rect x="22" y="88" width="12" height="12" rx="2" fill="#c9a44e" stroke="#161214" stroke-width="2"/>
  <rect x="94" y="88" width="12" height="12" rx="2" fill="#c9a44e" stroke="#161214" stroke-width="2"/>
  <!-- gold filigree banding -->
  <line x1="42" y1="26" x2="42" y2="104" stroke="#c9a44e" stroke-width="3"/>
  <line x1="86" y1="26" x2="86" y2="104" stroke="#c9a44e" stroke-width="3"/>
  <!-- central warded sigil-lock -->
  <circle cx="64" cy="68" r="15" fill="#2a2326" stroke="#c9a44e" stroke-width="3"/>
  <circle cx="64" cy="68" r="7" fill="#6fd2e6" stroke="#161214" stroke-width="2"/>
  <line x1="64" y1="55" x2="64" y2="61" stroke="#6fd2e6" stroke-width="3"/>
  <line x1="64" y1="75" x2="64" y2="81" stroke="#6fd2e6" stroke-width="3"/>
  <line x1="51" y1="68" x2="57" y2="68" stroke="#6fd2e6" stroke-width="3"/>
  <line x1="71" y1="68" x2="77" y2="68" stroke="#6fd2e6" stroke-width="3"/>
</svg>
