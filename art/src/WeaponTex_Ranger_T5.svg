  <path d="M138 18 C166 34 152 56 128 72 C100 96 100 128 100 128 C100 128 100 160 128 184 C152 200 166 222 138 238" stroke="#4FB8FF" stroke-width="26" fill="none" stroke-linecap="round" opacity="0.16"/>
