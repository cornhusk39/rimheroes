<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fire imp, side profile facing right: horned head/snout right, wing, body in profile, tail trailing left, hand cupping flame forward. -->
  <defs>
    <radialGradient id="impE_skin" cx="0.55" cy="0.4">
      <stop offset="0%" stop-color="#E8533B"/>
      <stop offset="100%" stop-color="#A11E1E"/>
    </radialGradient>
    <radialGradient id="impE_flame" cx="0.5" cy="0.7" r="0.7">
      <stop offset="0%" stop-color="#FFF2A8"/>
      <stop offset="45%" stop-color="#FFC23D"/>
      <stop offset="100%" stop-color="#F4521E"/>
    </radialGradient>
  </defs>

  <!-- tail trailing left with spade tip -->
  <path d="M104 176 C66 184 46 168 40 150 C52 158 62 152 60 140 C72 150 90 160 110 162 Z" fill="#8C1A1A"/>
  <path d="M38 150 L16 142 L30 166 L44 160 Z" fill="#A11E1E"/>

  <!-- far wing (behind body) -->
  <path d="M118 124 C82 96 76 130 86 148 C96 140 100 150 96 162 C116 154 126 138 126 128 Z" fill="#6E1414"/>
  <path d="M118 126 C92 108 88 132 94 148 C104 142 106 152 102 162 C118 156 124 142 124 130 Z" fill="#561010"/>

  <!-- far leg -->
  <path d="M124 172 L138 200" stroke="#8C1A1A" stroke-width="11" stroke-linecap="round"/>
  <path d="M136 200 L130 214 M140 200 L142 215 M146 200 L152 213" stroke="#D9C896" stroke-width="4" stroke-linecap="round"/>

  <!-- body in profile, leaning forward (right) -->
  <path d="M104 150 C100 124 150 120 156 146 L150 188 C140 198 116 198 108 186 Z" fill="url(#impE_skin)"/>
  <!-- belly highlight toward front -->
  <ellipse cx="142" cy="166" rx="12" ry="22" fill="#E8694F" opacity="0.5"/>

  <!-- near wing (in front, raised) -->
  <path d="M120 120 C88 86 80 124 92 146 C102 136 106 148 100 162 C124 152 136 132 134 122 Z" fill="#8C1A1A"/>
  <path d="M120 122 C96 100 90 128 98 146 C108 138 112 150 106 162 C126 154 130 136 130 124 Z" fill="#6E1414"/>

  <!-- near leg -->
  <path d="M132 174 L150 202" stroke="#A11E1E" stroke-width="12" stroke-linecap="round"/>
  <path d="M148 202 L142 216 M152 202 L154 218 M158 202 L164 215" stroke="#EEDFAE" stroke-width="4.5" stroke-linecap="round"/>

  <!-- arm reaching forward cupping flame -->
  <path d="M148 152 L176 158" stroke="#A11E1E" stroke-width="11" stroke-linecap="round"/>
  <circle cx="178" cy="158" r="7" fill="#B12525"/>

  <!-- cupped flame at front hand -->
  <path d="M178 154 C164 154 158 138 170 124 C168 136 176 132 174 122 C186 130 192 142 188 154 C192 148 196 150 194 158 C186 164 172 164 166 156 C170 160 174 160 178 154 Z" fill="url(#impE_flame)"/>

  <!-- oversized head in profile, snout pointing right -->
  <path d="M114 100 C112 66 166 64 184 90 C192 102 188 116 172 122 C158 128 140 132 128 128 C116 124 114 112 114 100 Z" fill="url(#impE_skin)"/>

  <!-- snout / grin -->
  <path d="M168 110 L190 108 L184 122 C176 126 168 122 166 116 Z" fill="#B12525"/>
  <path d="M170 116 Q180 122 188 116" stroke="#5A1212" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M174 116 L176 122 L179 116 M182 116 L184 121 L187 116" fill="#F5EEDD"/>

  <!-- pointy ear (back of head) -->
  <path d="M118 92 L94 80 L114 104 Z" fill="#A11E1E"/>
  <path d="M118 94 L102 84 L114 100 Z" fill="#7A1717"/>

  <!-- horns (pale), swept back -->
  <path d="M132 72 C120 54 110 50 104 48 C114 52 126 58 138 72 Z" fill="#F0E4BC"/>
  <path d="M132 72 C124 60 116 56 110 53 C118 57 128 64 136 73 Z" fill="#D9C896"/>
  <path d="M150 70 C142 50 138 44 136 40 C142 48 150 58 156 70 Z" fill="#F0E4BC"/>

  <!-- yellow-orange eye (profile, one visible) -->
  <ellipse cx="158" cy="98" rx="9" ry="11" fill="#FFD24A"/>
  <ellipse cx="161" cy="99" rx="3.5" ry="6" fill="#5A2A00"/>
  <circle cx="156" cy="94" r="2" fill="#FFF6D8"/>
</svg>
