<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- top-down forge shaft: dark stone rim around a glowing lava throat -->
  <rect x="14" y="14" width="100" height="100" rx="8" fill="#2b2622" stroke="#0f0c0a" stroke-width="5"/>
  <rect x="26" y="26" width="76" height="76" rx="5" fill="#1a1512"/>
  <!-- lava glow -->
  <ellipse cx="64" cy="66" rx="30" ry="28" fill="#7a2410"/>
  <ellipse cx="64" cy="66" rx="20" ry="18" fill="#c64517"/>
  <ellipse cx="64" cy="64" rx="11" ry="10" fill="#f59023"/>
  <ellipse cx="62" cy="62" rx="5" ry="5" fill="#ffd66b"/>
  <!-- iron grate bars across the throat -->
  <g stroke="#0f0c0a" stroke-width="4">
    <line x1="48" y1="34" x2="48" y2="98"/>
    <line x1="64" y1="34" x2="64" y2="98"/>
    <line x1="80" y1="34" x2="80" y2="98"/>
  </g>
</svg>
