<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="de_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6342B"/>
      <stop offset="100%" stop-color="#971D1B"/>
    </linearGradient>
    <linearGradient id="de_wing" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#B92E27"/>
      <stop offset="55%" stop-color="#E8702E"/>
      <stop offset="100%" stop-color="#F4A23C"/>
    </linearGradient>
    <linearGradient id="de_belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8C75A"/>
      <stop offset="100%" stop-color="#DD8328"/>
    </linearGradient>
    <radialGradient id="de_fire" cx="0.4" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFF1B0"/>
      <stop offset="55%" stop-color="#FF8A1E"/>
      <stop offset="100%" stop-color="#E2581F"/>
    </radialGradient>
  </defs>

  <!-- TAIL trailing left, long taper -->
  <path d="M70 150 C44 150 24 162 12 184 C30 176 44 178 56 174 C40 178 30 190 28 204 C46 192 60 192 72 186 C82 180 88 170 90 158 Z" fill="url(#de_body)"/>
  <path d="M12 184 C20 186 26 192 26 200 C18 196 12 192 8 186 Z" fill="#EAD49A"/>
  <!-- tail top ridge spikes -->
  <path d="M88 154 l-6 -12 l10 6 Z M72 162 l-6 -12 l10 6 Z M56 170 l-5 -11 l9 5 Z" fill="#7E1818"/>

  <!-- FAR legs (behind body, darker) -->
  <path d="M108 168 C104 188 106 206 100 222 C96 206 96 192 92 180 Z" fill="#8E1B19"/>
  <path d="M150 168 C148 188 150 206 144 222 C140 206 140 192 138 180 Z" fill="#8E1B19"/>
  <path d="M96 218 l-3 12 m8 -10 l-1 12 m9 -12 l2 11" stroke="#C7AE78" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 218 l-3 12 m8 -10 l-1 12 m9 -12 l2 11" stroke="#C7AE78" stroke-width="4" stroke-linecap="round"/>

  <!-- BODY in profile -->
  <path d="M84 152 C84 124 110 110 142 112 C172 114 192 130 192 150 C192 176 168 192 138 192 C108 192 84 178 84 152 Z" fill="url(#de_body)"/>
  <!-- belly underside -->
  <path d="M92 168 C100 186 124 192 144 190 C166 188 184 178 188 162 C176 174 150 178 128 176 C112 174 100 170 92 168 Z" fill="url(#de_belly)"/>
  <path d="M104 176 h8 m6 4 h8 m6 2 h8 m6 0 h8" stroke="#C9761F" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <!-- flank muscle shading -->
  <ellipse cx="130" cy="148" rx="34" ry="20" fill="#B22822" opacity="0.4"/>

  <!-- back spine ridge -->
  <path d="M96 124 l-7 -14 l13 6 Z M116 116 l-6 -16 l13 8 Z M138 114 l-4 -16 l12 8 Z M162 120 l2 -15 l11 10 Z" fill="#7E1818"/>

  <!-- NEAR WING raised, spread -->
  <path d="M132 124 C150 86 184 64 214 62 C198 76 190 92 188 108 C204 96 220 96 232 106 C214 110 202 122 198 138 C214 132 226 138 230 152 C208 146 192 150 178 158 C162 142 144 132 132 124 Z" fill="url(#de_wing)"/>
  <path d="M132 124 C156 110 182 102 198 108 C204 96 220 96 232 106 C214 110 202 122 198 138 C214 132 226 138 230 152 C208 146 192 150 178 158 C162 142 144 132 132 124 Z" fill="#B83A26" opacity="0.32"/>
  <!-- finger bones -->
  <path d="M132 124 C162 100 192 78 214 62" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>
  <path d="M150 132 C176 116 206 106 230 106" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>
  <path d="M166 146 C188 134 212 130 230 152" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>

  <!-- NEAR legs (front, lighter) -->
  <path d="M120 178 C116 198 118 214 112 230 C108 214 106 200 102 188 Z" fill="url(#de_body)"/>
  <path d="M164 176 C162 196 164 212 158 228 C154 212 152 198 150 186 Z" fill="url(#de_body)"/>
  <path d="M108 226 l-3 12 m8 -10 l-1 12 m9 -12 l2 11" stroke="#EAD49A" stroke-width="5" stroke-linecap="round"/>
  <path d="M152 224 l-3 12 m8 -10 l-1 12 m9 -12 l2 11" stroke="#EAD49A" stroke-width="5" stroke-linecap="round"/>

  <!-- NECK -->
  <path d="M178 122 C188 104 204 96 218 98 C214 110 214 124 208 136 C198 134 186 130 178 130 Z" fill="url(#de_body)"/>

  <!-- HEAD pointing right -->
  <!-- horns sweeping back -->
  <path d="M206 96 C200 78 198 62 204 50 C212 64 216 78 220 92 Z" fill="#EAD49A"/>
  <path d="M214 100 C212 84 214 70 222 60 C226 72 226 86 224 98 Z" fill="#E0C685"/>
  <path d="M206 96 C202 82 202 66 204 50" fill="none" stroke="#C9A85F" stroke-width="3" opacity="0.6"/>
  <!-- head mass -->
  <path d="M204 104 C214 100 234 102 244 116 C250 126 246 140 234 146 C222 152 206 148 200 138 C194 126 196 110 204 104 Z" fill="url(#de_body)"/>
  <!-- brow shading -->
  <path d="M206 108 C216 104 232 106 240 116 C228 112 214 114 206 120 Z" fill="#B22822" opacity="0.5"/>
  <!-- jaw / snout to the right -->
  <path d="M232 122 C246 122 256 130 254 140 C252 148 240 150 230 146 C236 138 234 128 232 122 Z" fill="url(#de_belly)"/>
  <!-- lower jaw -->
  <path d="M222 146 C232 152 246 152 252 146 C246 156 232 160 220 156 Z" fill="#8E1B19"/>
  <!-- nostril -->
  <circle cx="248" cy="132" r="2.6" fill="#7E1818"/>
  <!-- eye -->
  <ellipse cx="220" cy="122" rx="7.5" ry="6.5" fill="#FFD24A"/>
  <path d="M217 122 a2.6 5 0 1 0 5.2 0 a2.6 5 0 1 0 -5.2 0" fill="#3A1208"/>
  <!-- brow spike -->
  <path d="M210 112 l-10 -6 l11 -1 Z" fill="#EAD49A"/>

  <!-- fire/smoke wisp from snout -->
  <path d="M254 138 C262 134 270 138 270 146 C276 142 282 146 280 154 C272 152 264 156 258 152 C254 148 254 142 254 138 Z" fill="url(#de_fire)" opacity="0.9"/>
  <circle cx="266" cy="146" r="4" fill="#FFE9A8" opacity="0.85"/>
</svg>
