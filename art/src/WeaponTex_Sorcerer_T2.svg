<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Hero Scepter: gold-banded rod, larger crimson gem. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.8) rotate(45) translate(-128 -128)">
  <!-- handle -->
  <rect x="121" y="84" width="14" height="142" rx="5" fill="#2E2622"/>
  <rect x="121" y="84" width="5" height="142" fill="#3D332C"/>
  <!-- gold bands -->
  <rect x="118" y="120" width="20" height="9" rx="2" fill="#E0A030"/>
  <rect x="118" y="160" width="20" height="9" rx="2" fill="#E0A030"/>
  <rect x="118" y="200" width="20" height="9" rx="2" fill="#E0A030"/>
  <!-- gold pommel -->
  <ellipse cx="128" cy="228" rx="11" ry="9" fill="#E0A030"/>
  <ellipse cx="128" cy="228" rx="5" ry="4" fill="#F2C84A"/>
  <!-- gold setting collar -->
  <rect x="116" y="74" width="24" height="14" rx="3" fill="#C79A3E"/>
  <path d="M114 76 L128 54 L142 76 Z" fill="#E0A030"/>
  <!-- larger crimson gem -->
  <path d="M128 40 L144 66 L128 84 L112 66 Z" fill="#8E2A2A"/>
  <path d="M128 40 L144 66 L128 66 Z" fill="#6E1E1E"/>
  <path d="M128 40 L128 84" stroke="#A83838" stroke-width="2"/>
  </g>
</svg>
