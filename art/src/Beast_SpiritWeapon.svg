<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff6d0"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe48a"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3b0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff3b0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- aura behind the weapon -->
  <ellipse cx="128" cy="128" rx="70" ry="118" fill="url(#halo)"/>
  <!-- shaft -->
  <rect x="121" y="40" width="14" height="184" rx="6" fill="url(#metal)"/>
  <!-- top spike -->
  <path d="M128 14 L138 52 L118 52 Z" fill="url(#metal)"/>
  <!-- axe blade (halberd head) -->
  <path d="M135 58 Q188 64 176 110 Q150 96 135 100 Z" fill="url(#metal)"/>
  <!-- rear hook -->
  <path d="M121 64 Q92 70 100 96 Q112 86 121 92 Z" fill="url(#metal)"/>
  <!-- butt cap -->
  <circle cx="128" cy="228" r="11" fill="url(#metal)"/>
  <!-- inner sheen lines -->
  <rect x="126" y="46" width="3" height="172" fill="#ffffff" opacity="0.7"/>
</svg>
