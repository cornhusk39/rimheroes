<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Quiller mim: porcupine with a fan of launch-ready quills. Front view. -->
  <!-- quill fan rising behind -->
  <path d="M60 130 L28 78 M84 112 L62 48 M112 102 L102 32 M144 102 L154 32 M172 112 L194 48 M196 130 L228 78" stroke="#5C4630" stroke-width="9" stroke-linecap="round"/>
  <path d="M28 78 L24 64 M62 48 L60 34 M102 32 L101 18 M154 32 L155 18 M194 48 L196 34 M228 78 L232 64" stroke="#D9C8A0" stroke-width="9" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="128" cy="168" rx="64" ry="60" fill="#8C6B4F"/>
  <ellipse cx="128" cy="184" rx="40" ry="36" fill="#C2A380"/>
  <!-- head -->
  <circle cx="128" cy="102" r="44" fill="#9A7757"/>
  <ellipse cx="120" cy="82" rx="26" ry="13" fill="#AA8A68" opacity="0.8"/>
  <!-- little round ears -->
  <circle cx="94" cy="74" r="11" fill="#7A5A40"/>
  <circle cx="162" cy="74" r="11" fill="#7A5A40"/>
  <!-- face: keen aim-y look -->
  <circle cx="112" cy="98" r="7" fill="#2E2620"/>
  <circle cx="144" cy="98" r="7" fill="#2E2620"/>
  <circle cx="114.5" cy="95.5" r="2.2" fill="#F5EEDD"/>
  <circle cx="146.5" cy="95.5" r="2.2" fill="#F5EEDD"/>
  <ellipse cx="128" cy="112" rx="7" ry="5" fill="#5C4630"/>
  <path d="M120 122 Q128 127 136 122" stroke="#5C4630" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- buck teeth -->
  <rect x="123" y="124" width="10" height="8" rx="2" fill="#F5EEDD"/>
  <!-- one quill held like a dart -->
  <path d="M170 158 L214 134" stroke="#5C4630" stroke-width="7" stroke-linecap="round"/>
  <path d="M214 134 L226 127" stroke="#D9C8A0" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="170" cy="158" rx="11" ry="9" fill="#9A7757"/>
  <!-- feet -->
  <ellipse cx="102" cy="226" rx="19" ry="11" fill="#6E5238"/>
  <ellipse cx="154" cy="226" rx="19" ry="11" fill="#6E5238"/>
</svg>
