<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fire imp, back view: back of horned head, spine, wings from behind, tail going up/away. No face. -->
  <defs>
    <radialGradient id="impN_skin" cx="0.5" cy="0.4">
      <stop offset="0%" stop-color="#C23030"/>
      <stop offset="100%" stop-color="#8C1A1A"/>
    </radialGradient>
  </defs>

  <!-- tail going up and away, spade tip -->
  <path d="M120 150 C108 116 132 92 148 88 C138 98 140 110 134 124 C128 138 124 146 124 152 Z" fill="#8C1A1A"/>
  <path d="M138 86 L156 64 L162 92 L146 96 Z" fill="#A11E1E"/>

  <!-- bat wings seen from behind (membrane facing us, folded back) -->
  <path d="M76 132 C32 104 22 142 36 162 C46 152 50 162 44 174 C60 168 64 178 60 190 C90 178 98 156 96 140 Z" fill="#6E1414"/>
  <path d="M82 138 C50 122 42 148 50 164 C58 156 62 166 58 178 C76 172 86 158 88 144 Z" fill="#561010"/>
  <path d="M180 132 C224 104 234 142 220 162 C210 152 206 162 212 174 C196 168 192 178 196 190 C166 178 158 156 160 140 Z" fill="#6E1414"/>
  <path d="M174 138 C206 122 214 148 206 164 C198 156 194 166 198 178 C180 172 170 158 168 144 Z" fill="#561010"/>

  <!-- skinny legs -->
  <path d="M108 176 L90 204" stroke="#8C1A1A" stroke-width="12" stroke-linecap="round"/>
  <path d="M148 176 L166 204" stroke="#8C1A1A" stroke-width="12" stroke-linecap="round"/>
  <path d="M86 204 L80 218 M90 204 L90 220 M94 204 L100 218" stroke="#EEDFAE" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M170 204 L164 218 M166 204 L166 220 M162 204 L156 218" stroke="#EEDFAE" stroke-width="4.5" stroke-linecap="round"/>

  <!-- arms down at sides -->
  <path d="M102 154 L82 184" stroke="#8C1A1A" stroke-width="11" stroke-linecap="round"/>
  <path d="M154 154 L174 184" stroke="#8C1A1A" stroke-width="11" stroke-linecap="round"/>

  <!-- back / torso -->
  <path d="M98 152 C98 126 158 126 158 152 L152 196 C140 206 116 206 104 196 Z" fill="url(#impN_skin)"/>
  <!-- spine -->
  <path d="M128 138 L128 196" stroke="#6E1414" stroke-width="5" stroke-linecap="round"/>
  <!-- shoulder-blade shading -->
  <path d="M112 150 C108 162 110 174 116 182" stroke="#6E1414" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M144 150 C148 162 146 174 140 182" stroke="#6E1414" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- back of oversized head -->
  <path d="M92 100 C92 64 164 64 164 100 C164 130 140 142 128 142 C116 142 92 130 92 100 Z" fill="url(#impN_skin)"/>
  <!-- skull crease -->
  <path d="M128 74 L128 132" stroke="#6E1414" stroke-width="4" stroke-linecap="round"/>

  <!-- pointy ears from behind -->
  <path d="M92 92 L66 80 L84 106 Z" fill="#8C1A1A"/>
  <path d="M164 92 L190 80 L172 106 Z" fill="#8C1A1A"/>

  <!-- horns from behind (pale) -->
  <path d="M106 68 C98 48 90 42 86 38 C94 44 104 52 112 66 Z" fill="#E2D2A4"/>
  <path d="M150 68 C158 48 166 42 170 38 C162 44 152 52 144 66 Z" fill="#E2D2A4"/>
  <path d="M106 68 C100 54 94 48 90 44 C96 50 102 58 108 67 Z" fill="#CDBA84"/>
  <path d="M150 68 C156 54 162 48 166 44 C160 50 154 58 148 67 Z" fill="#CDBA84"/>
</svg>
