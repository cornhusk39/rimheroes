  <path d="M20 50 q10 -10 22 -6" fill="none" stroke="#6b543a" stroke-width="5" stroke-linecap="round"/>
  <path d="M108 54 q-12 -10 -24 -4" fill="none" stroke="#6b543a" stroke-width="5" stroke-linecap="round"/>
