<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- ornate sigil-key matching the reliquary's cyan ward -->
  <!-- bow (handle) -->
  <circle cx="40" cy="44" r="20" fill="none" stroke="#c9a44e" stroke-width="9"/>
  <circle cx="40" cy="44" r="7" fill="#6fd2e6" stroke="#161214" stroke-width="2.5"/>
  <!-- shaft -->
  <line x1="54" y1="58" x2="92" y2="96" stroke="#c9a44e" stroke-width="9" stroke-linecap="round"/>
  <!-- bit teeth -->
  <rect x="84" y="84" width="8" height="16" fill="#c9a44e" stroke="#161214" stroke-width="2.5"/>
  <rect x="74" y="74" width="8" height="14" fill="#c9a44e" stroke="#161214" stroke-width="2.5"/>
  <!-- ward spark at the tip -->
  <circle cx="94" cy="98" r="5" fill="#6fd2e6" stroke="#161214" stroke-width="2"/>
</svg>
