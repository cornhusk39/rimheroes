<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- seal frame (shared across all inlays): flat-top hexagon -->
  <polygon points="58,32 45,54.5 19,54.5 6,32 19,9.5 45,9.5" fill="#1a1510"/>
  <polygon points="53,32 42,51 22,51 11,32 22,13 42,13" fill="#6b4646"/>
  <polygon points="53,32 42,51 22,51 11,32 22,13 42,13" fill="none" stroke="#8a5a5a" stroke-width="1.5"/>
  <!-- rivets at the corners -->
  <circle cx="32" cy="14.5" r="1.4" fill="#2a1c1c"/>
  <circle cx="32" cy="49.5" r="1.4" fill="#2a1c1c"/>
  <!-- glyph: sword (offense) -->
  <g stroke="#2a1414" stroke-width="1.2" stroke-linejoin="round">
    <polygon points="32,18 35,24 34,40 30,40 29,24" fill="#d9a9a9"/>
    <rect x="23.5" y="39.5" width="17" height="3.2" rx="1" fill="#caa05a"/>
    <rect x="30.4" y="42.5" width="3.2" height="6.5" rx="1" fill="#7a5a3a"/>
    <circle cx="32" cy="50.5" r="2.4" fill="#caa05a"/>
  </g>
</svg>
