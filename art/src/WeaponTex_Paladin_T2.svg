<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Hero Warhammer: bright steel head, royal-blue band motif. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.8) rotate(45) translate(-128 -128)">
  <!-- haft -->
  <rect x="121" y="74" width="14" height="158" rx="5" fill="#5E4527"/>
  <rect x="121" y="74" width="5" height="158" fill="#73552F"/>
  <ellipse cx="128" cy="234" rx="11" ry="9" fill="#4E3A20"/>
  <!-- blue grip wrap -->
  <rect x="119" y="150" width="18" height="22" rx="3" fill="#2E4E9E"/>
  <rect x="119" y="155" width="18" height="3" fill="#4866BE"/>
  <!-- hammer head block, steel -->
  <rect x="90" y="42" width="76" height="42" rx="4" fill="#C4CBD6"/>
  <rect x="90" y="42" width="76" height="13" fill="#DCE2EC"/>
  <rect x="90" y="76" width="76" height="8" fill="#9AA3B0"/>
  <!-- striking face -->
  <rect x="86" y="46" width="8" height="34" rx="2" fill="#9AA3B0"/>
  <!-- royal-blue band across head -->
  <rect x="90" y="60" width="76" height="9" fill="#2E4E9E"/>
  <rect x="90" y="60" width="76" height="2.5" fill="#4866BE"/>
  <!-- back spike -->
  <path d="M166 50 L200 58 L200 68 L166 76 Z" fill="#C4CBD6"/>
  <path d="M166 58 L200 63 L166 68 Z" fill="#9AA3B0"/>
  <!-- collar -->
  <rect x="115" y="80" width="26" height="10" rx="2" fill="#8E949B"/>
  <!-- top of head -->
  <rect x="123" y="34" width="10" height="14" rx="3" fill="#C4CBD6"/>
  </g>
</svg>
