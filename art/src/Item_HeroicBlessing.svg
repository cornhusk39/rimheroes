<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d2" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#f4ca5c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4ca5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="45%" stop-color="#fbe39a"/>
      <stop offset="80%" stop-color="#f2c050"/>
      <stop offset="100%" stop-color="#d2911f"/>
    </radialGradient>
  </defs>
  <!-- soft pulsing halo -->
  <circle cx="32" cy="32" r="31" fill="url(#glow)"/>
  <!-- the orb -->
  <circle cx="32" cy="32" r="15" fill="url(#orb)"/>
  <!-- thin shine ring -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="#fff7dc" stroke-width="1" stroke-opacity="0.5"/>
  <!-- specular highlight -->
  <ellipse cx="26" cy="25" rx="5" ry="3.5" fill="#ffffff" fill-opacity="0.85" transform="rotate(-30 26 25)"/>
  <circle cx="38" cy="40" r="1.6" fill="#ffffff" fill-opacity="0.6"/>
  <!-- drifting sparks -->
  <path d="M50 18 l1.2 3 3 1.2 -3 1.2 -1.2 3 -1.2 -3 -3 -1.2 3 -1.2 Z" fill="#fff4cf" fill-opacity="0.9"/>
  <path d="M16 44 l0.9 2.2 2.2 0.9 -2.2 0.9 -0.9 2.2 -0.9 -2.2 -2.2 -0.9 2.2 -0.9 Z" fill="#fff4cf" fill-opacity="0.8"/>
</svg>
