<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Lesser Hero Daggers: plain pair of iron daggers crossed in an X, tips up, grips crossing at bottom. -->
  <g transform="translate(128 128) scale(0.8) rotate(45) translate(-128 -128)">
  <!-- LEFT dagger: grip lower-right, blade tip upper-left -->
  <rect x="118" y="150" width="13" height="78" rx="5" fill="#3A3A42" transform="rotate(-18 128 190)"/>
  <rect x="118" y="150" width="5" height="78" fill="#46464F" transform="rotate(-18 128 190)"/>
  <rect x="100" y="142" width="44" height="12" rx="3" fill="#2E2E36" transform="rotate(-18 122 148)"/>
  <path d="M104 150 L70 40 L92 132 Z" fill="#8E949B" transform="rotate(-18 128 128)"/>
  <path d="M104 150 L70 40 L82 96 Z" fill="#777D84" transform="rotate(-18 128 128)"/>
  <path d="M70 40 L82 96" stroke="#C6CBD0" stroke-width="2.5" fill="none" transform="rotate(-18 128 128)"/>
  <!-- RIGHT dagger: grip lower-left, blade tip upper-right -->
  <rect x="125" y="150" width="13" height="78" rx="5" fill="#3A3A42" transform="rotate(18 128 190)"/>
  <rect x="125" y="150" width="5" height="78" fill="#46464F" transform="rotate(18 128 190)"/>
  <rect x="112" y="142" width="44" height="12" rx="3" fill="#2E2E36" transform="rotate(18 134 148)"/>
  <path d="M152 150 L186 40 L164 132 Z" fill="#8E949B" transform="rotate(18 128 128)"/>
  <path d="M152 150 L186 40 L174 96 Z" fill="#777D84" transform="rotate(18 128 128)"/>
  <path d="M186 40 L174 96" stroke="#C6CBD0" stroke-width="2.5" fill="none" transform="rotate(18 128 128)"/>
  </g>
</svg>
