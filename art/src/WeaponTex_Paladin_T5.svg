<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <g transform="translate(128 128) scale(0.72) rotate(45) translate(-128 -128)">
  <!-- Dawnbreaker (capstone): hammer blazing with dawn-light, radiant white-gold burst. -->
  <!-- dawn burst aura, layered -->
  <ellipse cx="128" cy="60" rx="104" ry="80" fill="#F2E8C0" opacity="0.16"/>
  <ellipse cx="128" cy="60" rx="78" ry="60" fill="#FFF6D8" opacity="0.2"/>
  <ellipse cx="128" cy="60" rx="46" ry="38" fill="#FFFBEC" opacity="0.22"/>
  <!-- radiant sunburst rays -->
  <g stroke="#F2E8C0" stroke-width="4" opacity="0.4">
    <path d="M128 60 L128 -16 M128 60 L204 -16 M128 60 L52 -16 M128 60 L218 60 M128 60 L38 60 M128 60 L188 118 M128 60 L68 118"/>
  </g>
  <g stroke="#FFFBEC" stroke-width="1.5" opacity="0.6">
    <path d="M128 60 L128 -10 M128 60 L198 -10 M128 60 L58 -10 M128 60 L212 60 M128 60 L44 60"/>
  </g>
  <!-- haft -->
  <rect x="119" y="74" width="18" height="162" rx="6" fill="#4E3A20"/>
  <rect x="119" y="74" width="5" height="162" fill="#6A4F2C"/>
  <!-- blazing dawn-light crack down haft -->
  <path d="M128 92 C123 130 133 168 127 202 C131 218 125 228 128 234" stroke="#C9A23F" stroke-width="4" fill="none"/>
  <path d="M128 92 C123 130 133 168 127 202 C131 218 125 228 128 234" stroke="#FFFBEC" stroke-width="1.5" fill="none"/>
  <!-- pommel sun -->
  <ellipse cx="128" cy="238" rx="16" ry="13" fill="#C9A23F"/>
  <ellipse cx="128" cy="238" rx="7" ry="6" fill="#FFF6D8"/>
  <!-- royal-blue grip wrap, gold-bound -->
  <rect x="117" y="144" width="22" height="30" rx="3" fill="#2E4E9E"/>
  <rect x="117" y="149" width="22" height="3" fill="#4866BE"/>
  <rect x="115" y="142" width="26" height="5" rx="2" fill="#C9A23F"/>
  <rect x="115" y="170" width="26" height="5" rx="2" fill="#C9A23F"/>
  <!-- hammer head block, blazing white-gold steel -->
  <rect x="80" y="32" width="96" height="52" rx="7" fill="#E8EDF4"/>
  <rect x="80" y="32" width="96" height="15" fill="#FFFBEC"/>
  <rect x="80" y="76" width="96" height="8" fill="#C4CBD6"/>
  <!-- striking face, dawn edge -->
  <rect x="74" y="36" width="10" height="44" rx="2" fill="#C4CBD6"/>
  <rect x="74" y="36" width="4" height="44" fill="#FFF6D8"/>
  <!-- gold dawn bands -->
  <rect x="80" y="36" width="96" height="7" fill="#C9A23F"/>
  <rect x="80" y="73" width="96" height="7" fill="#C9A23F"/>
  <!-- blazing holy runes flanking core -->
  <path d="M96 56 L104 48 L104 70 L96 64 M152 48 L160 56 L152 62 L160 70" stroke="#FFFBEC" stroke-width="3.5" fill="none"/>
  <!-- dawn-light core, blazing gem -->
  <circle cx="128" cy="58" r="15" fill="#C9A23F"/>
  <circle cx="128" cy="58" r="10" fill="#2E4E9E"/>
  <circle cx="128" cy="58" r="5" fill="#FFF6D8"/>
  <circle cx="128" cy="58" r="2" fill="#FFFFFF"/>
  <!-- back spike, blazing -->
  <path d="M176 40 L222 48 L222 68 L176 76 Z" fill="#E8EDF4"/>
  <path d="M176 48 L222 58 L176 68 Z" fill="#C4CBD6"/>
  <path d="M176 46 L222 54" stroke="#C9A23F" stroke-width="3.5"/>
  <path d="M176 43 L222 51" stroke="#FFFBEC" stroke-width="1.5"/>
  <!-- collar -->
  <rect x="110" y="80" width="36" height="11" rx="2" fill="#C9A23F"/>
  <rect x="110" y="80" width="36" height="3" fill="#E3C56A"/>
  <!-- blazing crown spike -->
  <path d="M128 6 L118 40 L138 40 Z" fill="#E8EDF4"/>
  <path d="M128 6 L128 40" stroke="#FFFBEC" stroke-width="3.5"/>
  </g>
</svg>
