<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- top-down stone pressure plate with a scything blade slot -->
  <rect x="20" y="20" width="88" height="88" rx="6" fill="#4a4640" stroke="#1c1a17" stroke-width="5"/>
  <!-- inner plate -->
  <rect x="34" y="34" width="60" height="60" rx="4" fill="#5c574e" stroke="#1c1a17" stroke-width="3"/>
  <!-- blade slot -->
  <rect x="40" y="60" width="48" height="8" rx="2" fill="#22201d" stroke="#1c1a17" stroke-width="2"/>
  <!-- the blade, half-emerged -->
  <polygon points="44,64 84,64 80,52 48,52" fill="#b9bec4" stroke="#1c1a17" stroke-width="2.5"/>
  <line x1="50" y1="56" x2="78" y2="56" stroke="#e6e9ec" stroke-width="2"/>
  <!-- corner rivets -->
  <circle cx="30" cy="30" r="3.4" fill="#2a2823"/>
  <circle cx="98" cy="30" r="3.4" fill="#2a2823"/>
  <circle cx="30" cy="98" r="3.4" fill="#2a2823"/>
  <circle cx="98" cy="98" r="3.4" fill="#2a2823"/>
</svg>
