  <path d="M118 52 C116 60 120 64 118 70 L122 70 C124 62 120 58 122 52 Z" fill="#FFFFFF"/>
  <!-- body (round velvet lump) -->
  <ellipse cx="128" cy="164" rx="68" ry="66" fill="#6B5B53"/>
  <ellipse cx="128" cy="182" rx="42" ry="38" fill="#8A7A70"/>
  <!-- head merges into body -->
  <circle cx="128" cy="100" r="46" fill="#75645B"/>
  <ellipse cx="120" cy="78" rx="28" ry="15" fill="#8A7A70" opacity="0.7"/>
