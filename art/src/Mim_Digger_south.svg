  <path d="M106 96 Q112 92 118 96" stroke="#2E2620" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M138 96 Q144 92 150 96" stroke="#2E2620" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- big pink nose -->
  <ellipse cx="128" cy="112" rx="13" ry="10" fill="#E8918A"/>
