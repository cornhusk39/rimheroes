  <path d="M40 170 L28 164 M38 182 L24 182 M42 194 L30 200" stroke="#C97F76" stroke-width="5" stroke-linecap="round"/>
  <path d="M194 150 C220 148 232 168 226 188 C220 206 196 210 182 198 C172 188 174 162 194 150 Z" fill="#E8A8A0"/>
  <path d="M216 170 L228 164 M218 182 L232 182 M214 194 L226 200" stroke="#C97F76" stroke-width="5" stroke-linecap="round"/>
  <!-- feet -->
