<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dis_beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#B6FFC9"/>
      <stop offset="100%" stop-color="#1FCB5A"/>
    </linearGradient>
    <radialGradient id="dis_burst" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#7DFFA0"/>
      <stop offset="100%" stop-color="#1FCB5A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- impact glow -->
  <circle cx="44" cy="40" r="18" fill="url(#dis_burst)"/>
  <!-- crumbling target -->
  <path d="M44 26 L52 33 L50 47 L40 50 L36 38 Z" fill="#8C9290"/>
  <path d="M44 26 L52 33 L48 38 L41 34 Z" fill="#B4BAB8"/>
  <!-- dissolving ash flecks -->
  <circle cx="54" cy="30" r="2.1" fill="#A7ADAB"/>
  <circle cx="57" cy="36" r="1.5" fill="#919795"/>
  <circle cx="56" cy="44" r="1.7" fill="#8C9290"/>
  <circle cx="52" cy="52" r="1.3" fill="#A7ADAB"/>
  <circle cx="58" cy="49" r="1" fill="#9CA2A0"/>
  <circle cx="59" cy="41" r="0.9" fill="#B4BAB8"/>
  <circle cx="46" cy="55" r="1.2" fill="#8C9290"/>
  <circle cx="54" cy="24" r="1" fill="#B4BAB8"/>
  <!-- intense beam -->
  <line x1="6" y1="10" x2="44" y2="40" stroke="url(#dis_beam)" stroke-width="6" stroke-linecap="round"/>
  <line x1="6" y1="10" x2="44" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- beam origin spark -->
  <circle cx="8" cy="11" r="4" fill="url(#dis_burst)"/>
</svg>
