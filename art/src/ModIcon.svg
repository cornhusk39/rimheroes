<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf2bf"/><stop offset="50%" stop-color="#ecc85e"/><stop offset="100%" stop-color="#a9781f"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cfd6e0"/><stop offset="45%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9aa3b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#8f5fe0" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#5a36a8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5a36a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dark badge -->
  <rect x="5" y="5" width="118" height="118" rx="24" fill="#171120"/>
  <rect x="5.5" y="5.5" width="117" height="117" rx="23.5" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="64" cy="60" r="46" fill="url(#glow)"/>

  <!-- sword, blade up -->
  <path d="M64 16 L70 74 L64 82 L58 74 Z" fill="url(#blade)" stroke="#6b7585" stroke-width="1.2"/>
  <rect x="62.6" y="24" width="2.8" height="52" rx="1.4" fill="#ffffff" opacity="0.7"/>
  <rect x="40" y="74" width="48" height="8" rx="4" fill="url(#gold)"/>
  <rect x="60" y="82" width="8" height="20" rx="2" fill="#3a2a14"/>
  <circle cx="64" cy="106" r="8" fill="url(#gold)"/>
  <circle cx="64" cy="106" r="3.6" fill="#7a3fc0"/>

  <!-- arcane sparkles -->
  <g fill="#f3e6b0">
    <path d="M36 42 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z"/>
    <path d="M94 54 l1.6 5 5 1.6 -5 1.6 -1.6 5 -1.6 -5 -5 -1.6 5 -1.6 z" fill="#c9a8ff"/>
  </g>
</svg>
