  <path d="M442 154 C462 152 474 162 472 176 C470 192 454 204 440 206 C436 192 434 168 442 154 Z" fill="#6E5238"/>
  <path d="M446 160 C458 159 466 166 464 175 C462 186 452 194 444 196 C441 186 440 170 446 160 Z" fill="#8A6A43"/>
