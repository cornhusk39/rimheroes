  <path d="M330 230 Q374 244 392 280 L360 300 Q340 272 312 262 Z" fill="#C49A66"/>
  <path d="M312 266 Q352 282 368 312 L338 330 Q322 304 296 296 Z" fill="#BC8E5A"/>
