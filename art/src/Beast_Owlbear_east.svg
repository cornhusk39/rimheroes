  <path d="M310 462 L304 486 M330 466 L330 490 M352 462 L358 486" stroke="#5C4630" stroke-width="11" stroke-linecap="round"/>
  <ellipse cx="150" cy="428" rx="52" ry="42" fill="#9A6C40"/>
