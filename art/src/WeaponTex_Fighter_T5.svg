<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Aegisedge (capstone): radiant blade, blue-white guard-aura, brilliant glowing core. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.72) rotate(45) translate(-128 -128)">
  <!-- energy aura -->
  <path d="M128 4 L100 38 L100 164 L156 164 L156 38 Z" fill="#9DC2FF" opacity="0.18"/>
  <path d="M128 10 L110 38 L110 160 L146 160 L146 38 Z" fill="#EAF3FF" opacity="0.18"/>
  <ellipse cx="128" cy="178" rx="58" ry="34" fill="#9DC2FF" opacity="0.16"/>
  <!-- radiant blade -->
  <path d="M128 12 L114 40 L114 150 L142 150 L142 40 Z" fill="#B8BEC6"/>
  <path d="M120 38 L120 150 L128 150 L128 22 Z" fill="#EAF3FF"/>
  <!-- blazing edges -->
  <path d="M114 40 L114 150 M142 40 L142 150 M128 12 L114 40 M128 12 L142 40" stroke="#9DC2FF" stroke-width="4" fill="none"/>
  <path d="M128 12 L128 150" stroke="#EAF3FF" stroke-width="2"/>
  <!-- glowing core runes -->
  <path d="M123 58 L133 63 L123 70 M123 88 L133 93 L123 100 M123 118 L133 123 L123 130" stroke="#4A6CC4" stroke-width="3.5" fill="none"/>
  <circle cx="128" cy="100" r="8" fill="#9DC2FF"/>
  <circle cx="128" cy="100" r="4" fill="#EAF3FF"/>
  <!-- winged guard with blue-white aura -->
  <path d="M128 150 L66 130 C52 144 56 160 72 164 L128 166 Z" fill="#C9A23F"/>
  <path d="M128 150 L190 130 C204 144 200 160 184 164 L128 166 Z" fill="#C9A23F"/>
  <path d="M66 130 C52 144 56 160 72 164 M190 130 C204 144 200 160 184 164" stroke="#EAF3FF" stroke-width="3" fill="none"/>
  <rect x="106" y="152" width="44" height="14" rx="4" fill="#E6C766"/>
  <!-- guard core gem -->
  <circle cx="128" cy="159" r="9" fill="#2E4E9E"/>
  <circle cx="128" cy="159" r="4" fill="#9DC2FF"/>
  <!-- cobalt-wrapped grip -->
  <rect x="119" y="166" width="18" height="46" rx="4" fill="#2E4E9E"/>
  <path d="M119 174 L137 178 M119 184 L137 188 M119 194 L137 198 M119 204 L137 208" stroke="#4A6CC4" stroke-width="3"/>
  <!-- radiant pommel -->
  <circle cx="128" cy="222" r="15" fill="#C9A23F"/>
  <circle cx="128" cy="222" r="9" fill="#2E4E9E"/>
  <circle cx="128" cy="222" r="4" fill="#EAF3FF"/>
  </g>
</svg>
