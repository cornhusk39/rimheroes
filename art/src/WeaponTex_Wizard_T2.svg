<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Hero Staff: silver-shod staff with a blue gem finial. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.72) rotate(45) translate(-128 -128)">
  <rect x="122" y="58" width="12" height="180" rx="5" fill="#4A3320"/>
  <rect x="122" y="58" width="4" height="180" fill="#5C4129"/>
  <!-- silver-shod foot -->
  <rect x="119" y="222" width="18" height="16" rx="3" fill="#C4CBD6"/>
  <ellipse cx="128" cy="238" rx="9" ry="6" fill="#A6ADB8"/>
  <!-- silver collar / ferrule below the head -->
  <rect x="117" y="66" width="22" height="12" rx="3" fill="#C4CBD6"/>
  <rect x="117" y="66" width="22" height="4" fill="#DBE0E8"/>
  <!-- silver claw setting holding the gem -->
  <path d="M114 60 L128 40 L142 60 Z" fill="#A6ADB8"/>
  <!-- blue gem finial -->
  <path d="M128 26 L113 46 L128 62 L143 46 Z" fill="#2E4E9E"/>
  <path d="M128 26 L120 46 L128 62 Z" fill="#4A6CC4"/>
  <path d="M128 30 L124 44 L128 52 Z" fill="#7E9AE0"/>
  </g>
</svg>
