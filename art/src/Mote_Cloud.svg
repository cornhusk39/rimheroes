<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- soft fuzzy gas puff: white so it tints cleanly to purple, edges feathered via radial alpha -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="54" r="34" fill="url(#g)"/>
  <circle cx="80" cy="60" r="30" fill="url(#g)"/>
  <circle cx="64" cy="78" r="28" fill="url(#g)"/>
  <circle cx="64" cy="48" r="32" fill="url(#g)"/>
</svg>
