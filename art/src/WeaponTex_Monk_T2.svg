<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Hero Fist Wraps: studded wraps with a bronze knuckle band. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.8) rotate(45) translate(-128 -128)">
  <!-- left wrapped fist -->
  <rect x="58" y="90" width="56" height="80" rx="16" fill="#C9852E"/>
  <rect x="58" y="90" width="20" height="80" rx="16" fill="#D89846"/>
  <rect x="66" y="160" width="40" height="52" rx="10" fill="#B5762A"/>
  <!-- left knuckle band (bronze) -->
  <rect x="54" y="96" width="64" height="14" rx="5" fill="#A8732E"/>
  <rect x="54" y="96" width="64" height="5" rx="2" fill="#C49A4A"/>
  <!-- studs on knuckle band -->
  <circle cx="68" cy="103" r="3" fill="#D8B468"/>
  <circle cx="86" cy="103" r="3" fill="#D8B468"/>
  <circle cx="104" cy="103" r="3" fill="#D8B468"/>
  <!-- left wrap bindings -->
  <rect x="56" y="120" width="60" height="9" rx="4" fill="#A8431A"/>
  <rect x="56" y="140" width="60" height="9" rx="4" fill="#A8431A"/>
  <rect x="62" y="178" width="48" height="8" rx="4" fill="#A8431A"/>

  <!-- right wrapped fist -->
  <rect x="142" y="90" width="56" height="80" rx="16" fill="#C9852E"/>
  <rect x="142" y="90" width="20" height="80" rx="16" fill="#D89846"/>
  <rect x="150" y="160" width="40" height="52" rx="10" fill="#B5762A"/>
  <rect x="138" y="96" width="64" height="14" rx="5" fill="#A8732E"/>
  <rect x="138" y="96" width="64" height="5" rx="2" fill="#C49A4A"/>
  <circle cx="152" cy="103" r="3" fill="#D8B468"/>
  <circle cx="170" cy="103" r="3" fill="#D8B468"/>
  <circle cx="188" cy="103" r="3" fill="#D8B468"/>
  <rect x="140" y="120" width="60" height="9" rx="4" fill="#A8431A"/>
  <rect x="140" y="140" width="60" height="9" rx="4" fill="#A8431A"/>
  <rect x="146" y="178" width="48" height="8" rx="4" fill="#A8431A"/>
  </g>
</svg>
