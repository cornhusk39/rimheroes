<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="ds_body" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#D6342B"/>
      <stop offset="100%" stop-color="#9C1F1C"/>
    </radialGradient>
    <linearGradient id="ds_wingL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0312A"/>
      <stop offset="55%" stop-color="#E8702E"/>
      <stop offset="100%" stop-color="#F4A23C"/>
    </linearGradient>
    <linearGradient id="ds_wingR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0312A"/>
      <stop offset="55%" stop-color="#E8702E"/>
      <stop offset="100%" stop-color="#F4A23C"/>
    </linearGradient>
    <radialGradient id="ds_belly" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#F8C75A"/>
      <stop offset="100%" stop-color="#E08A2C"/>
    </radialGradient>
    <radialGradient id="ds_fire" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#FFF1B0"/>
      <stop offset="60%" stop-color="#FF8A1E"/>
      <stop offset="100%" stop-color="#E2581F"/>
    </radialGradient>
  </defs>

  <!-- WINGS spread wide behind -->
