  <ellipse cx="143" cy="98" rx="9" ry="7" fill="#FFD24A"/>
  <path d="M110 98 a3 6 0 1 0 6 0 a3 6 0 1 0 -6 0" fill="#3A1208"/>
  <path d="M140 98 a3 6 0 1 0 6 0 a3 6 0 1 0 -6 0" fill="#3A1208"/>

