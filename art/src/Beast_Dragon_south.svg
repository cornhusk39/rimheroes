  <path d="M92 168 C74 178 70 196 78 214 C82 200 92 192 102 190 C100 182 98 174 96 168 Z" fill="url(#ds_body)"/>
  <path d="M164 168 C182 178 186 196 178 214 C174 200 164 192 154 190 C156 182 158 174 160 168 Z" fill="url(#ds_body)"/>
