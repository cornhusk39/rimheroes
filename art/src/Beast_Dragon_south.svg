  <path d="M128 116 C108 120 100 142 104 168 C108 188 118 196 128 196 C138 196 148 188 152 168 C156 142 148 120 128 116 Z" fill="url(#ds_belly)"/>
  <path d="M114 138 H142 M112 152 H144 M114 166 H142 M118 180 H138" stroke="#CF7A24" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

