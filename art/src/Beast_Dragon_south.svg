  <path d="M144 116 C168 110 196 112 214 126" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>
  <path d="M152 140 C172 138 192 142 206 154" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>

  <!-- TAIL curling out behind -->
