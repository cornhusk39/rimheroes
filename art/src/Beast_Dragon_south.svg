  <path d="M112 116 C88 110 60 112 42 126" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>
  <path d="M104 140 C84 138 64 142 50 154" fill="none" stroke="#E9C98A" stroke-width="5" stroke-linecap="round"/>

  <!-- Right wing -->
