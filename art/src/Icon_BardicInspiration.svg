<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bardNote" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#d39bff"/>
      <stop offset="1" stop-color="#5a1f9c"/>
    </linearGradient>
    <radialGradient id="bardGlow" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#e9c9ff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#7b2fc9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bardSpark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3c0"/>
      <stop offset="1" stop-color="#f0b53a"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="34" r="26" fill="url(#bardGlow)"/>
  <!-- swelling sound-wave arcs rising -->
  <path d="M8 44 q6 -10 14 -6" fill="none" stroke="#b56bf0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M6 52 q10 -16 20 -10" fill="none" stroke="#9a4be0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- eighth note: two stems + beam + note heads -->
  <path d="M26 52 L26 16 L48 11 L48 20 L34 24 L34 48"
        fill="none" stroke="url(#bardNote)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="22" cy="50" rx="8" ry="6" transform="rotate(-20 22 50)" fill="url(#bardNote)"/>
  <ellipse cx="30" cy="46" rx="8" ry="6" transform="rotate(-20 30 46)" fill="url(#bardNote)"/>
  <!-- note highlight -->
  <path d="M28 20 L46 16" fill="none" stroke="#ecd0ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- sparkles -->
  <path d="M52 28 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 Z" fill="url(#bardSpark)"/>
  <path d="M14 18 l1.5 3.5 3.5 1.5 -3.5 1.5 -1.5 3.5 -1.5 -3.5 -3.5 -1.5 3.5 -1.5 Z" fill="url(#bardSpark)"/>
  <path d="M50 46 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 Z" fill="#fff3c0"/>
</svg>
