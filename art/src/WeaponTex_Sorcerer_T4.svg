<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Perfect Hero Scepter: energy-wreathed, arcing gold sparks, glowing gem, glow halo. Drawn vertical, rotated up-right. -->
  <g transform="translate(128 128) scale(0.72) rotate(45) translate(-128 -128)">
  <!-- glow halo around gem -->
  <circle cx="128" cy="56" r="44" fill="#F2C84A" opacity="0.16"/>
  <circle cx="128" cy="56" r="30" fill="#FFB347" opacity="0.18"/>
  <!-- handle -->
  <rect x="119" y="80" width="18" height="146" rx="6" fill="#2A211D"/>
  <rect x="119" y="80" width="5" height="146" fill="#3D332C"/>
  <!-- gold wrap bands with highlight -->
  <rect x="114" y="108" width="28" height="11" rx="2" fill="#E0A030"/>
  <rect x="114" y="150" width="28" height="11" rx="2" fill="#E0A030"/>
  <rect x="114" y="192" width="28" height="11" rx="2" fill="#E0A030"/>
  <rect x="114" y="108" width="28" height="3" fill="#F2C84A"/>
  <rect x="114" y="150" width="28" height="3" fill="#F2C84A"/>
  <rect x="114" y="192" width="28" height="3" fill="#F2C84A"/>
  <!-- glowing pommel -->
  <ellipse cx="128" cy="228" rx="14" ry="11" fill="#E0A030"/>
  <ellipse cx="128" cy="228" rx="7" ry="6" fill="#F2C84A"/>
  <!-- ornate claw setting -->
  <path d="M108 80 L128 48 L148 80 Z" fill="#C79A3E"/>
  <path d="M110 82 L102 60 M146 82 L154 60" stroke="#E0A030" stroke-width="6" stroke-linecap="round"/>
  <!-- arcing gold sparks -->
  <path d="M90 50 L104 56 L96 66 L108 72" stroke="#F2C84A" stroke-width="3" fill="none"/>
  <path d="M166 50 L152 56 L160 66 L148 72" stroke="#F2C84A" stroke-width="3" fill="none"/>
  <path d="M128 12 L122 36 M128 12 L134 36" stroke="#FFB347" stroke-width="2.5" fill="none"/>
  <!-- glowing faceted crimson gem -->
  <path d="M128 24 L154 60 L128 90 L102 60 Z" fill="#8E2A2A"/>
  <path d="M128 24 L154 60 L128 60 Z" fill="#6E1E1E"/>
  <path d="M128 24 L128 90 M102 60 L154 60" stroke="#E0A030" stroke-width="2"/>
  <circle cx="128" cy="58" r="9" fill="#F2C84A"/>
  <circle cx="128" cy="58" r="4" fill="#FFF0C0"/>
  </g>
</svg>
