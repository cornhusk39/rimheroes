<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fire imp, front view: grinning toward viewer, little wings out, one hand cupping a flame, tail curling behind. -->
  <defs>
    <radialGradient id="impS_skin" cx="0.42" cy="0.36">
      <stop offset="0%" stop-color="#E8533B"/>
      <stop offset="100%" stop-color="#A11E1E"/>
    </radialGradient>
    <radialGradient id="impS_flame" cx="0.5" cy="0.7" r="0.7">
      <stop offset="0%" stop-color="#FFF2A8"/>
      <stop offset="45%" stop-color="#FFC23D"/>
      <stop offset="100%" stop-color="#F4521E"/>
    </radialGradient>
  </defs>

  <!-- tail curling behind, with spade tip -->
  <path d="M150 196 C188 196 196 168 178 150 C168 140 158 146 162 158 C166 168 156 174 144 168 Z" fill="#8C1A1A"/>
  <path d="M170 138 L196 130 L182 154 L168 150 Z" fill="#A11E1E"/>

  <!-- bat wings out to the sides (behind body) -->
  <path d="M70 130 C30 96 24 132 36 150 C46 142 50 150 44 162 C58 156 60 166 56 178 C84 168 92 150 92 138 Z" fill="#7A1717"/>
  <path d="M70 132 C44 110 38 134 44 150 C54 144 56 154 52 166 C72 160 82 148 84 138 Z" fill="#5E1111"/>
  <path d="M186 130 C226 96 232 132 220 150 C210 142 206 150 212 162 C198 156 196 166 200 178 C172 168 164 150 164 138 Z" fill="#7A1717"/>
  <path d="M186 132 C212 110 218 134 212 150 C202 144 200 154 204 166 C184 160 174 148 172 138 Z" fill="#5E1111"/>

  <!-- skinny limbs -->
  <path d="M104 168 L86 196" stroke="#A11E1E" stroke-width="12" stroke-linecap="round"/>
  <path d="M152 168 L172 196" stroke="#A11E1E" stroke-width="12" stroke-linecap="round"/>
  <!-- clawed feet -->
  <path d="M82 196 L74 210 M86 196 L86 212 M90 196 L96 210" stroke="#EEDFAE" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M168 196 L162 210 M172 196 L172 212 M176 196 L182 210" stroke="#EEDFAE" stroke-width="4.5" stroke-linecap="round"/>

  <!-- body / torso -->
  <path d="M98 150 C98 124 158 124 158 150 L152 190 C140 200 116 200 104 190 Z" fill="url(#impS_skin)"/>
  <!-- belly highlight -->
  <ellipse cx="128" cy="170" rx="20" ry="26" fill="#E8694F" opacity="0.55"/>

  <!-- left arm cupping flame, right arm flung out -->
  <path d="M100 150 L74 160" stroke="#A11E1E" stroke-width="12" stroke-linecap="round"/>
  <path d="M156 150 L182 158" stroke="#A11E1E" stroke-width="12" stroke-linecap="round"/>
  <!-- clawed hands -->
  <circle cx="184" cy="160" r="7" fill="#B12525"/>
  <path d="M184 154 L182 146 M190 158 L196 152 M188 166 L194 170" stroke="#EEDFAE" stroke-width="3.5" stroke-linecap="round"/>

  <!-- cupped flame near left hand -->
  <circle cx="68" cy="160" r="7" fill="#B12525"/>
  <path d="M68 156 C54 156 48 140 60 126 C58 138 66 134 64 124 C76 132 82 144 78 156 C82 150 86 152 84 160 C76 166 62 166 56 158 C60 162 64 162 68 156 Z" fill="url(#impS_flame)"/>

  <!-- oversized head -->
  <path d="M92 96 C92 58 164 58 164 96 C164 128 140 140 128 140 C116 140 92 128 92 96 Z" fill="url(#impS_skin)"/>

  <!-- pointy ears -->
  <path d="M92 88 L66 76 L84 102 Z" fill="#A11E1E"/>
  <path d="M164 88 L190 76 L172 102 Z" fill="#A11E1E"/>
  <path d="M90 90 L74 82 L84 98 Z" fill="#7A1717"/>
  <path d="M166 90 L182 82 L172 98 Z" fill="#7A1717"/>

  <!-- horns (pale) -->
  <path d="M104 64 C96 44 88 38 84 34 C92 40 102 48 110 62 Z" fill="#F0E4BC"/>
  <path d="M152 64 C160 44 168 38 172 34 C164 40 154 48 146 62 Z" fill="#F0E4BC"/>
  <path d="M104 64 C98 50 92 44 88 40 C94 46 100 54 106 63 Z" fill="#D9C896"/>
  <path d="M152 64 C158 50 164 44 168 40 C162 46 156 54 150 63 Z" fill="#D9C896"/>

  <!-- yellow-orange eyes -->
  <ellipse cx="113" cy="96" rx="10" ry="12" fill="#FFD24A"/>
  <ellipse cx="143" cy="96" rx="10" ry="12" fill="#FFD24A"/>
  <ellipse cx="114" cy="98" rx="4" ry="6" fill="#5A2A00"/>
  <ellipse cx="144" cy="98" rx="4" ry="6" fill="#5A2A00"/>
  <circle cx="111" cy="92" r="2" fill="#FFF6D8"/>
  <circle cx="141" cy="92" r="2" fill="#FFF6D8"/>

  <!-- toothy grin -->
  <path d="M108 116 Q128 134 148 116 Z" fill="#5A1212"/>
  <path d="M108 116 Q128 134 148 116" fill="none" stroke="#7A1717" stroke-width="2"/>
  <path d="M114 119 L117 127 L120 119 M124 121 L127 129 L130 121 M134 121 L137 129 L140 121" fill="#F5EEDD"/>
</svg>
