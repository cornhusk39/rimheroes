  <rect x="170" y="54" width="16" height="9" rx="4" fill="#51565B"/>
  <!-- wings (tiny, out to the sides) -->
  <path d="M52 140 C30 124 28 102 42 92 C52 106 58 124 60 142 Z" fill="#9C7430"/>
  <path d="M204 140 C226 124 228 102 214 92 C204 106 198 124 196 142 Z" fill="#9C7430"/>
  <path d="M50 134 C36 122 34 106 44 98 C51 110 55 122 56 134 Z" fill="#C99A45"/>
