  <ellipse cx="128" cy="182" rx="40" ry="38" fill="#EAD9AC"/>
  <path d="M96 166 Q128 158 160 166 M96 182 Q128 174 160 182 M100 198 Q128 191 156 198 M106 213 Q128 207 150 213" stroke="#D2BC83" stroke-width="4" fill="none"/>
  <!-- head -->
  <circle cx="128" cy="100" r="46" fill="#D8AC56"/>
  <ellipse cx="118" cy="80" rx="28" ry="14" fill="#E3BC72" opacity="0.7"/>
  <!-- snout -->
  <ellipse cx="128" cy="118" rx="22" ry="14" fill="#E3BC72"/>
  <ellipse cx="120" cy="114" rx="3.5" ry="5" fill="#9C7430"/>
  <ellipse cx="136" cy="114" rx="3.5" ry="5" fill="#9C7430"/>
