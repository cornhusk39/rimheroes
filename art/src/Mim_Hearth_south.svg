  <circle cx="106" cy="94" r="7.5" fill="#2E2620"/>
  <circle cx="150" cy="94" r="7.5" fill="#2E2620"/>
  <circle cx="108.5" cy="91.5" r="2.3" fill="#F5EEDD"/>
